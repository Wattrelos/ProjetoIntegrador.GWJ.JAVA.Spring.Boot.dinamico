<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{parts/header :: head}"></head>

<body>

    <!-- Substitui o antigo PHP include para inserir o header completo -->
    <div th:replace="~{parts/header :: header}"></div>

    <!-- wp:group {"tagName":"main","metadata":{"name":"Main"},"align":"full","layout":{"type":"constrained"}} -->
    <main class="wp-block-group alignfull" style="margin-top: 0;">

        <!-- Seção Hero com Efeito Parallax -->
        <div class="hero-section">
            <h1 class="hero-title" th:text="'Bem-vindo à ' + ${empresa.nome}">Bem-vindo à Tgo's Barbearia</h1>
            <p class="hero-description">Tradição, estilo e o melhor atendimento para você. Agende seu horário e viva
                essa experiência.</p>

            <!-- Ajustado para o modelo de rotas do Spring usando th:href -->
            <a th:href="@{/servicos}" class="wp-element-button hero-btn">Agendar Agora</a>
        </div>

        <!-- Dados carregados dinamicamente com fallback estático -->
        <div class="alignwide" id="servicos">
            <h2 class="section-title">Nossos Serviços</h2>
            <div class="services-grid">

                <!-- Serviços Dinâmicos do Banco -->
                <div class="servico-card" th:each="servico : ${servicos}" th:if="${servico.ativo}">
                    <img th:src="${servico.imagem != null && !servico.imagem.isBlank()} ? ${servico.imagem} : '/img/no-image.png'"
                        th:alt="${servico.nome}">
                    <h3 class="servico-title" th:text="${servico.nome}">Corte Clássico Masculino</h3>
                    <p class="servico-desc" th:text="${servico.descricao}">Descrição do serviço.</p>
                    <strong class="servico-price"
                        th:text="'R$ ' + ${#numbers.formatDecimal(servico.preco, 1, 'POINT', 2, 'COMMA')}">R$
                        45,00</strong>
                    <a th:href="@{/servicos(servicoId=${servico.id})}" class="wp-element-button servico-btn">Agendar</a>
                </div>
            </div>
        </div>
    </main>

    <!-- wp:spacer {"height":"var:preset|spacing|20"} -->
    <div style="height:var(--wp--preset--spacing--20)" aria-hidden="true" class="wp-block-spacer"></div>
    <!-- /wp:spacer -->

    <!-- Substitui o antigo PHP include para inserir o footer completo -->
    <div th:replace="~{parts/footer :: footer}"></div>
</body>

</html>
