        <!-- Tabela Dinâmica -->
        <div class="data-table" layout:fragment="content">
            <h3 th:text="'Listagem de ' + ${entidadeNome}"></h3>
            <table>
                <thead>
                    <tr>
                        <!-- Cabeçalhos baseados nos atributos da classe -->
                        <th th:each="col : ${colunas}" th:text="${#strings.capitalize(col)}">Coluna</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${lista}">
                        <!-- Itera pelas colunas enviadas pelo Controller -->
                        <td th:each="col : ${colunas}">
                            <!-- Chamamos o fragmento recursivo UMA VEZ para cada célula -->
                            <!-- Ele decidirá se o valor é String, Lista ou Objeto -->
                            <div th:replace="~{fragments/recursiveField :: recursiveField(${item[col]})}"></div>
                        </td>
                        <td>
                            <!-- Corrigido o fechamento da tag <a> -->
                            Ver</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
