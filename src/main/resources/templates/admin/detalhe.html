<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org" xmlns:layout="http://ultraq.net.nz"
    layout:decorate="~{admin/layouts/main-layout}">

<head>
    <title>Sobre Nós - GWJ</title>
    <!-- Se quiser um CSS específico só para esta página -->
    <!-- <link rel="stylesheet" th:href="@{/css/sobre.css}">-->
    <!-- Importa o script de máscaras universais -->
    <script th:src="@{/js/masks.js}" defer></script>
</head>

<body>

    <!-- Note que NÃO incluímos o bloco 'aside-content' aqui.
        Isso fará com que o aside suma e o main ocupe 100% da largura. -->

    <section layout:fragment="content">
        <div class="gwj-container gwj-mt-4">
            <h2 th:text="${'Detalhes de: ' + entidadeNome}">Detalhes</h2>
            <hr style="border-top: 1px solid var(--gwj-border-color); margin: 1.5rem 0;">

            <!-- Iteramos sobre a lista 'detalhe' (que é sua List<IEntity>) -->
            <div th:each="obj : ${detalhe}">
                <!-- Trocamos a tag form por div, pois não haverá submissão de dados aqui -->
                <div class="gwj-card gwj-p-4 gwj-form-row">

                    <!-- Iteramos sobre os nomes das colunas extraídas por reflexão -->
                    <!-- O th:if filtra campos de controle interno para visualização mais limpa -->
                    <div th:each="coluna : ${colunas}"
                        th:if="${!#lists.contains({'id', 'token', 'ip', 'dataCadastro'}, coluna)}" class="gwj-form-col-6 gwj-form-group">
                        <label th:for="${coluna}" class="gwj-label"
                            th:text="${#strings.capitalize(coluna)}">Campo</label>

                        <!-- Lógica condicional para Coleções -->
                        <div th:if="${obj[coluna] instanceof T(java.util.Collection)}">
                            <select class="gwj-select gwj-input-readonly" disabled>
                                <option value="" disabled selected>-- Ver lista --</option>
                                <option th:each="subItem : ${obj[coluna]}" th:text="${displayHelper.apply(subItem)}">
                                </option>
                            </select>
                        </div>

                        <!-- Lógica para valores simples -->
                        <div th:unless="${obj[coluna] instanceof T(java.util.Collection)}"
                            class="gwj-input gwj-input-readonly" th:id="${coluna}">
                            <th:block th:if="${obj[coluna] != null}">
                                <span th:if="${obj[coluna] instanceof T(com.gwj.model.domain.IEntity)}"
                                    th:text="${displayHelper.apply(obj[coluna])}"></span>
                                <span th:if="${obj[coluna] instanceof T(java.time.LocalDateTime)}"
                                    th:text="${#temporals.format(obj[coluna], 'dd/MM/yyyy HH:mm')}"></span>
                                <span th:if="${obj[coluna] instanceof T(java.time.LocalDate)}"
                                    th:text="${#temporals.format(obj[coluna], 'dd/MM/yyyy')}"></span>
                                <span th:if="${obj[coluna] instanceof T(java.util.Date)}"
                                    th:text="${#dates.format(obj[coluna], 'dd/MM/yyyy HH:mm')}"></span>
                                <span th:if="${obj[coluna] instanceof T(java.math.BigDecimal)}"
                                    th:text="'R$ ' + ${#numbers.formatDecimal(obj[coluna], 1, 'POINT', 2, 'COMMA')}"></span>
                                <span th:if="${obj[coluna] instanceof T(java.lang.Boolean)}"
                                    th:class="${obj[coluna] ? 'gwj-badge gwj-badge-success' : 'gwj-badge gwj-badge-secondary'}"
                                    th:text="${obj[coluna] ? 'Sim' : 'Não'}"></span>
                                <span
                                    th:if="${!(obj[coluna] instanceof T(com.gwj.model.domain.IEntity)) and !(obj[coluna] instanceof T(java.time.LocalDateTime)) and !(obj[coluna] instanceof T(java.time.LocalDate)) and !(obj[coluna] instanceof T(java.util.Date)) and !(obj[coluna] instanceof T(java.math.BigDecimal)) and !(obj[coluna] instanceof T(java.lang.Boolean))}"
                                    th:text="${obj[coluna]}"></span>
                            </th:block>
                            <span th:if="${obj[coluna] == null}">—</span>
                        </div>
                    </div>

                    <div class="gwj-form-col-12 gwj-mt-4">
                        <a th:href="@{/MRYnZpAsC9sp/listar/{entity}(entity=${entidadeNome})}"
                            class="gwj-btn gwj-btn-secondary">Voltar</a>
                        <a th:href="@{/MRYnZpAsC9sp/editar/{entity}(entity=${entidadeNome}, id=${obj.id})}"
                            class="gwj-btn gwj-btn-primary">Editar</a>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
