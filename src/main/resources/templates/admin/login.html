<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Barbearia GWJ</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Inter & Playfair Display -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1a1c23, #0f1015);
            color: #f3f4f6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .login-card {
            background: rgba(30, 32, 44, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .brand-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.25rem;
            font-weight: 700;
            background: linear-gradient(135deg, #e5c07b, #c5a880);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }

        .brand-subtitle {
            font-size: 0.875rem;
            color: #9ca3af;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-label {
            font-size: 0.8125rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #d1d5db;
            margin-bottom: 0.5rem;
        }

        .form-control {
            background-color: rgba(15, 16, 21, 0.7) !important;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f3f4f6 !important;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-size: 0.9375rem;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            background-color: rgba(15, 16, 21, 0.9) !important;
            border-color: #e5c07b;
            box-shadow: 0 0 0 3px rgba(229, 192, 123, 0.15);
            outline: none;
        }

        .btn-gold {
            background: linear-gradient(135deg, #e5c07b, #b39257);
            border: none;
            color: #0f1015;
            font-weight: 700;
            font-size: 0.9375rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 8px;
            padding: 0.8rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(229, 192, 123, 0.2);
        }

        .btn-gold:hover {
            background: linear-gradient(135deg, #ebd09c, #cda766);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(229, 192, 123, 0.3);
            color: #0f1015;
        }

        .btn-gold:active {
            transform: translateY(1px);
        }

        .alert-danger {
            background-color: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            border-radius: 8px;
            font-size: 0.875rem;
            padding: 0.75rem 1rem;
        }

        .alert-success {
            background-color: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #a7f3d0;
            border-radius: 8px;
            font-size: 0.875rem;
            padding: 0.75rem 1rem;
        }

        .footer-text {
            font-size: 0.75rem;
            color: #6b7280;
            margin-top: 2rem;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="text-center mb-4">
            <h2 class="brand-title">GWJ Barbearia</h2>
            <div class="brand-subtitle">Painel de Controle</div>
        </div>

        <!-- Alertas de erro e sucesso -->
        <div th:if="${erro != null}" class="alert alert-danger text-center mb-3" role="alert">
            <span th:text="${erro}">E-mail ou senha inválidos.</span>
        </div>

        <div th:if="${sucesso != null}" class="alert alert-success text-center mb-3" role="alert">
            <span th:text="${sucesso}">Sucesso no login.</span>
        </div>

        <!-- Formulário de Autenticação -->
        <form th:action="@{/MRYnZpAsC9sp/login}" method="post">
            
            <!-- Campo E-mail -->
            <div class="mb-3">
                <label for="email" class="form-label">E-mail Corporativo</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="nome@barbeariagwj.com" required autofocus>
            </div>
            
            <!-- Campo Senha -->
            <div class="mb-4">
                <label for="senha" class="form-label">Senha de Acesso</label>
                <input type="password" class="form-control" id="senha" name="senha" placeholder="Sua senha secreta" required>
            </div>
            
            <!-- Botão de Enviar -->
            <div class="d-grid">
                <button type="submit" class="btn btn-gold btn-lg">Entrar no Painel</button>
            </div>
            
        </form>

        <div class="footer-text">
            &copy; 2026 GWJ Barbearia. Acesso restrito a pessoal autorizado.
        </div>
    </div>

</body>
</html>
