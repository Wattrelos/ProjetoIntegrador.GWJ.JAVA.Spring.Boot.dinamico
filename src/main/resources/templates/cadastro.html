<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Barbearia GWJ</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script th:src="@{/js/masks.js}" defer></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div class="cadastro-container">
        <div class="cadastro-card">
            <div class="text-center mb-4">
                <h2 class="logo-title fw-bold text-dark mb-1">Tgo's <span>Barbearia</span></h2>
                <p class="text-muted">Crie a sua conta de cliente</p>
            </div>

            <!-- Exibe o alerta de erro se houver algum problema -->
            <div th:if="${erro != null}" class="alert alert-danger text-center py-2" role="alert">
                <span th:text="${erro}">Erro ao cadastrar.</span>
            </div>

            <!-- Alerta de senhas diferentes no frontend -->
            <div id="passwordAlert" class="alert alert-danger text-center py-2 d-none" role="alert">
                As senhas informadas não coincidem.
            </div>

            <!-- Formulário de Cadastro -->
            <form id="cadastroForm" th:action="@{/cadastro}" method="post" class="needs-validation" novalidate>
                
                <div class="row">
                    <!-- Campo Nome -->
                    <div class="col-md-6 mb-3">
                        <label for="nome" class="form-label fw-semibold">Nome</label>
                        <input type="text" class="form-control" id="nome" name="nome" th:value="${nome}" placeholder="João" required>
                    </div>
                    
                    <!-- Campo Sobrenome -->
                    <div class="col-md-6 mb-3">
                        <label for="sobrenome" class="form-label fw-semibold">Sobrenome</label>
                        <input type="text" class="form-control" id="sobrenome" name="sobrenome" th:value="${sobrenome}" placeholder="Silva" required>
                    </div>
                </div>

                <!-- Campo E-mail -->
                <div class="mb-3">
                    <label for="email" class="form-label fw-semibold">E-mail</label>
                    <input type="email" class="form-control" id="email" name="email" th:value="${email}" placeholder="seu@email.com" required>
                </div>
                
                <!-- Campo Telefone -->
                <div class="mb-3">
                    <label for="telefone" class="form-label fw-semibold">Telefone / WhatsApp</label>
                    <input type="tel" class="form-control" id="telefone" name="telefone" th:value="${telefone}" placeholder="(11) 99999-9999" required>
                </div>

                <!-- Campo Senha -->
                <div class="mb-3">
                    <label for="senha" class="form-label fw-semibold">Senha</label>
                    <input type="password" class="form-control" id="senha" name="senha" placeholder="Crie uma senha forte" required>
                </div>

                <!-- Campo Confirmar Senha -->
                <div class="mb-4">
                    <label for="confirmarSenha" class="form-label fw-semibold">Confirmar Senha</label>
                    <input type="password" class="form-control" id="confirmarSenha" placeholder="Repita a senha criada" required>
                </div>
                
                <!-- Botão de Enviar -->
                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-theme btn-lg py-2">Criar Conta</button>
                </div>

                <div class="text-center mt-3">
                    <span class="text-muted">Já tem uma conta?</span>
                    <a th:href="@{/login}" class="fw-bold text-decoration-none text-dark" style="border-bottom: 2px solid #d4af37;">Fazer Login</a>
                </div>
                
            </form>
        </div>
    </div>

    <!-- Script de validação local do formulário -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('cadastroForm');
            const senha = document.getElementById('senha');
            const confirmarSenha = document.getElementById('confirmarSenha');
            const passwordAlert = document.getElementById('passwordAlert');

            form.addEventListener('submit', (event) => {
                let valid = true;
                
                // Valida se as senhas coincidem
                if (senha.value !== confirmarSenha.value) {
                    passwordAlert.classList.remove('d-none');
                    confirmarSenha.classList.add('is-invalid');
                    valid = false;
                } else {
                    passwordAlert.classList.add('d-none');
                    confirmarSenha.classList.remove('is-invalid');
                }

                if (!form.checkValidity() || !valid) {
                    event.preventDefault();
                    event.stopPropagation();
                }

                form.classList.add('was-validated');
            }, false);
        });
    </script>
</body>
</html>
