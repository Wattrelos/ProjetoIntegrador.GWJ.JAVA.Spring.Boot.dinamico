<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org" 
      xmlns:layout="http://ultraq.net.nz"
      layout:decorate="~{layouts/main-layout}">
<head>
    <title>Checkout - Barbearia</title>
</head>
<body>

    <section layout:fragment="content">
        <main class="wp-block-group alignfull page-main-bg">
            <div class="alignwide">
                <h1 class="text-center mb-40">Finalizar Reserva</h1>
                
                <div class="layout-grid">
                    
                    <!-- Coluna 1: Formulário de Dados e Pagamento -->
                    <div class="card-panel">
                        <h2 class="panel-title">Seus Dados</h2>
                        <form class="flex-col gap-1-5">
                            
                            <div class="custom-form-row">
                                <label>Nome: <input type="text" placeholder="João" class="custom-input mt-2"></label>
                                <label>Sobrenome: <input type="text" placeholder="Silva" class="custom-input mt-2"></label>
                            </div>
                            
                            <label>E-mail: <input type="email" placeholder="joao@email.com" class="custom-input mt-2"></label>
                            <label>Telefone / WhatsApp: <input type="tel" placeholder="(11) 99999-9999" class="custom-input mt-2"></label>

                            <h2 class="panel-title mt-5">Método de Pagamento</h2>
                            
                            <div class="payment-panel">
                                <label class="payment-method-label">
                                    <input type="radio" name="pagamento" checked> Cartão de Crédito
                                </label>
                                <input type="text" placeholder="Número do Cartão (0000 0000 0000 0000)" class="custom-input mb-4">
                                <div class="custom-form-row">
                                    <input type="text" placeholder="Validade (MM/AA)" class="custom-input">
                                    <input type="text" placeholder="CVC" class="custom-input">
                                </div>
                                
                                <hr class="divider">
                                
                                <label class="payment-method-label" style="margin-bottom: 0;">
                                    <input type="radio" name="pagamento"> Pagar na Barbearia (Dinheiro ou Pix)
                                </label>
                            </div>
                        </form>
                    </div>

                    <!-- Coluna 2: Resumo do Pedido -->
                    <div class="card-panel is-sticky">
                        <h3 class="panel-title mb-5">Resumo do Pedido</h3>
                        
                        <div class="summary-item"><span>Corte Clássico Masculino</span><span>R$ 45,00</span></div>
                        <div class="summary-item mb-5"><span>Barboterapia Premium</span><span>R$ 35,00</span></div>
                        
                        <div class="summary-total">
                            <span>Total</span><span class="has-theme-3-color">R$ 80,00</span>
                        </div>

                        <a th:href="@{/order-confirmation}" class="wp-element-button btn-block">Confirmar Reserva</a>
                    </div>
                </div>
            </div>
        </main>
    </section>

</body>
</html>
