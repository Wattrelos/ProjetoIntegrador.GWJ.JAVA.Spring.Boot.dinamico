<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org" 
      xmlns:layout="http://ultraq.net.nz"
      layout:decorate="~{layouts/main-layout}">
<head>
    <title>Checkout - Barbearia</title>
</head>
<body>

    <section layout:fragment="content">
         <main class="wp-block-group alignfull page-main-bg">
             <div class="alignwide">
                 <h1 class="text-center mb-40">Finalizar Reserva</h1>
                 
                 <div class="layout-grid">
                     
                     <!-- Coluna 1: Formulário de Dados e Pagamento -->
                     <div class="card-panel">
                         <h2 class="panel-title">Seus Dados</h2>
                         <form id="checkoutForm" th:action="@{/checkout/confirmar}" method="POST" class="flex-col gap-1-5">
                             
                             <input type="hidden" name="servicoId" th:value="${servicoId}">
                             <input type="hidden" name="profissionalId" th:value="${profissionalId}">
                             <input type="hidden" name="dataHora" th:value="${dataHora}">
 
                             <div th:if="${erro}" class="alert alert-danger" style="background-color: rgba(255,77,77,0.1); border-left: 4px solid #ff4d4d; padding: 12px; color: #ff4d4d; border-radius: 4px; margin-bottom: 15px;" th:text="${erro}"></div>
 
                             <div class="custom-form-row">
                                 <label>Nome: <input type="text" name="nome" th:value="${clienteLogado != null ? clienteLogado.nome : ''}" placeholder="João" class="custom-input mt-2" required></label>
                                 <label>Sobrenome: <input type="text" name="sobrenome" th:value="${clienteLogado != null ? clienteLogado.sobrenome : ''}" placeholder="Silva" class="custom-input mt-2" required></label>
                             </div>
                             
                             <label>E-mail: <input type="email" name="email" th:value="${clienteLogado != null ? clienteLogado.email : ''}" placeholder="joao@email.com" class="custom-input mt-2" required></label>
                             <label>Telefone / WhatsApp: <input type="tel" name="telefone" th:value="${clienteLogado != null ? clienteLogado.telefone : ''}" placeholder="(11) 99999-9999" class="custom-input mt-2" required></label>
 
                             <h2 class="panel-title mt-5">Método de Pagamento</h2>
                             
                             <div class="payment-panel">
                                 <label class="payment-method-label">
                                     <input type="radio" name="pagamento" value="cartao" checked> Cartão de Crédito
                                 </label>
                                 <input type="text" placeholder="Número do Cartão (0000 0000 0000 0000)" class="custom-input mb-4">
                                 <div class="custom-form-row">
                                     <input type="text" placeholder="Validade (MM/AA)" class="custom-input">
                                     <input type="text" placeholder="CVC" class="custom-input">
                                 </div>
                                 
                                 <hr class="divider">
                                 
                                 <label class="payment-method-label" style="margin-bottom: 0;">
                                     <input type="radio" name="pagamento" value="presencial"> Pagar na Barbearia (Dinheiro ou Pix)
                                 </label>
                             </div>
                         </form>
                     </div>
 
                     <!-- Coluna 2: Resumo do Pedido -->
                     <div class="card-panel is-sticky">
                         <h3 class="panel-title mb-5">Resumo do Pedido</h3>
                         
                         <div class="summary-item" th:if="${servico}">
                             <span th:text="${servico.nome}">Serviço</span>
                             <span th:text="'R$ ' + ${#numbers.formatDecimal(servico.preco, 1, 'POINT', 2, 'COMMA')}">R$ 0,00</span>
                         </div>
                         <div class="summary-item">
                             <span>Profissional</span>
                             <span th:text="${profissional != null ? profissional.nome + ' ' + profissional.sobrenome : 'Qualquer profissional livre'}">Qualquer profissional livre</span>
                         </div>
                         <div class="summary-item mb-5">
                             <span>Data e Horário</span>
                             <span th:text="${dataHoraFormatada}">Data e Horário</span>
                         </div>
                         
                         <div class="summary-total" th:if="${servico}">
                             <span>Total</span>
                             <span class="has-theme-3-color" th:text="'R$ ' + ${#numbers.formatDecimal(servico.preco, 1, 'POINT', 2, 'COMMA')}">R$ 0,00</span>
                         </div>
 
                         <button type="submit" form="checkoutForm" class="wp-element-button btn-block">Confirmar Reserva</button>
                     </div>
                 </div>
             </div>
         </main>
     </section>

</body>
</html>
