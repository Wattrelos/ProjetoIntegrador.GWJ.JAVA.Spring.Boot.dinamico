<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org" 
      xmlns:layout="http://ultraq.net.nz"
      layout:decorate="~{layouts/main-layout}">
<head>
    <title>Sobre Nós - GWJ</title>
    <!-- Se quiser um CSS específico só para esta página -->
    <link rel="stylesheet" th:href="@{/css/sobre.css}">
</head>
<body>

    <!-- Note que NÃO incluímos o bloco 'aside-content' aqui. 
         Isso fará com que o aside suma e o main ocupe 100% da largura. -->

    <section layout:fragment="content">
        <div class="sobre-container">
            <h1>Nossa História</h1>
            <p class="lead">Desde 2026, a GWJ busca excelência em tecnologia e atendimento.</p>
            
            <div class="missao-visao-valores" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 30px;">
                <div class="item">
                    <h3>Missão</h3>
                    <p>Oferecer a melhor experiência de compra online.</p>
                </div>
                <div class="item">
                    <h3>Visão</h3>
                    <p>Ser referência em e-commerce no Brasil.</p>
                </div>
                <div class="item">
                    <h3>Valores</h3>
                    <p>Transparência, agilidade e respeito ao cliente.</p>
                </div>
            </div>

            <div class="contato-info" style="margin-top: 40px; padding: 20px; background: #eee;">
                <h3>Onde estamos</h3>
                <p>Rua da Tecnologia, 123 - São Paulo/SP</p>
            </div>
        </div>
    </section>

</body>
</html>
