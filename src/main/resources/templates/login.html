<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Barbearia GWJ</title>
    <!-- Bootstrap CSS (Via CDN para teste rápido) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card shadow p-4" style="width: 100%; max-width: 400px;">
        <div class="text-center mb-4">
            <h2 class="text-primary fw-bold">Barbearia GWJ</h2>
            <p class="text-muted">Acesse o sistema</p>
        </div>

        <!-- Exibe o alerta de erro se o LoginController enviar a variável 'erro' -->
        <div th:if="${erro != null}" class="alert alert-danger text-center" role="alert">
            <span th:text="${erro}">E-mail ou senha inválidos.</span>
        </div>

        <!-- Exibe o alerta de sucesso se o cadastro foi realizado -->
        <div th:if="${sucesso != null}" class="alert alert-success text-center" role="alert">
            <span th:text="${sucesso}">Sucesso no cadastro.</span>
        </div>

        <!-- Formulário de Autenticação -->
        <form th:action="@{/login}" method="post">
            
            <!-- Campo E-mail -->
            <div class="mb-3">
                <label for="email" class="form-label fw-semibold">E-mail</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="seu@email.com" required autofocus>
            </div>
            
            <!-- Campo Senha -->
            <div class="mb-4">
                <label for="senha" class="form-label fw-semibold">Senha</label>
                <input type="password" class="form-control" id="senha" name="senha" placeholder="Sua senha" required>
            </div>
            
            <!-- Botão de Enviar -->
            <div class="d-grid mb-3">
                <button type="submit" class="btn btn-primary btn-lg">Entrar</button>
            </div>

            <!-- Link para cadastro -->
            <div class="text-center">
                <span class="text-muted">Não tem uma conta?</span>
                <a th:href="@{/cadastro}" class="fw-bold text-decoration-none">Cadastre-se</a>
            </div>
            
        </form>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
