<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org" xmlns:layout="http://ultraq.net.nz" layout:decorate="~{layouts/main-layout}">

<head>
    <title>Login - Barbearia GWJ</title>
    <!-- Custom validation script -->
    <script th:src="@{/js/validation.js}" defer></script>
</head>

<body>
    <section layout:fragment="content">
        <div class="cadastro-container">
            <div class="cadastro-card">
                <div style="text-align: center; margin-bottom: 1.5rem;">
                    <h2 class="logo-title" style="font-weight: bold; color: var(--text-main); margin-bottom: 0.25rem; font-size: 1.8rem;">Tgo's <span>Barbearia</span></h2>
                    <p style="color: var(--text-muted); font-size: 0.95rem; margin: 0;">Faça login para ter acesso ao sistema</p>
                </div>

                <!-- Exibe o alerta de erro se houver algum problema -->
                <div th:if="${erro != null}" class="custom-alert-danger" style="background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; padding: 0.8rem; border-radius: 6px; text-align: center; margin-bottom: 1.5rem; font-size: 0.95rem;">
                    <span th:text="${erro}">E-mail ou senha inválidos.</span>
                </div>

                <!-- Exibe o alerta de sucesso se houver -->
                <div th:if="${sucesso != null}" class="custom-alert-success" style="background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; padding: 0.8rem; border-radius: 6px; text-align: center; margin-bottom: 1.5rem; font-size: 0.95rem;">
                    <span th:text="${sucesso}">Sucesso no cadastro.</span>
                </div>

                <!-- Formulário de Login -->
                <form id="loginForm" th:action="@{/login}" method="post" class="flex-col gap-1-5 needs-validation" novalidate>

                    <!-- Campo E-mail -->
                    <div class="custom-form-group">
                        <label for="email" class="custom-label">E-mail</label>
                        <input type="email" class="custom-input" id="email" name="email" placeholder="seu@email.com"
                            required>
                    </div>

                    <!-- Campo Senha -->
                    <div class="custom-form-group">
                        <label for="senha" class="custom-label">Senha</label>
                        <input type="password" class="custom-input" id="senha" name="senha"
                            placeholder="Digite sua senha" required>
                    </div>

                    <!-- Botão de Enviar -->
                    <div style="margin-top: 0.5rem;">
                        <button type="submit" class="btn btn-theme" style="width: 100%; border: none; cursor: pointer; padding: 1rem; font-size: 1.05rem;">Entrar</button>
                    </div>

                    <div style="text-align: center; margin-top: 0.5rem; font-size: 0.95rem;">
                        <span style="color: var(--text-muted);">Não tem uma conta?</span>
                        <a th:href="@{/cadastro}" style="font-weight: bold; text-decoration: none; color: var(--text-main); border-bottom: 2px solid var(--primary-color);">Cadastre-se</a>
                    </div>

                </form>
            </div>
        </div>
    </section>
</body>

</html>
