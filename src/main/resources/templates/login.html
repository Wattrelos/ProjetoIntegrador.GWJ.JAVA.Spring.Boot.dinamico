<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{parts/header :: head}"></head>

<body>
    <div th:replace="~{parts/header :: header}"></div>

    <main class="wp-block-group alignfull" style="margin-top:0; padding: var(--wp--preset--spacing--50) 0;">
        <div class="alignwide">
            <h1 class="page-title">Login</h1>
            <p class="page-subtitle">Faça login para ter acesso ao sistema.</p>
            <!-- Coluna do Formulário -->
            <div class="contact-form-container">
                <h3>Login</h3>
                
                <!-- Alertas de erro e sucesso -->
                <div th:if="${erro != null}" class="alert alert-danger text-center" style="margin-bottom: 20px; padding: 10px; border-radius: 4px; background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb;">
                    <span th:text="${erro}">E-mail ou senha inválidos.</span>
                </div>
                <div th:if="${sucesso != null}" class="alert alert-success text-center" style="margin-bottom: 20px; padding: 10px; border-radius: 4px; background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb;">
                    <span th:text="${sucesso}">Sucesso no cadastro.</span>
                </div>

                <form class="contact-form" th:action="@{/login}" method="post">
                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" name="senha" required>
                    </div>

                    <button type="submit" class="wp-element-button">Entrar</button>
                </form>
                <div class="text-center" style="margin-top: 15px;">
                    <p>Não tem uma conta? <a href="/cadastro">Cadastre-se</a></p>
                </div>
            </div>
        </div>
        </div>
    </main>
    <div th:replace="~{parts/footer :: footer}"></div>
</body>

</html>
