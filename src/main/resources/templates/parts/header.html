<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!-- Fragmento do HEAD (usado para importar CSS) -->
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tgo's Barbearia</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <!-- Fragmento do HEADER (Cabeçalho da Página) -->
    <header class="modern-header" th:fragment="header">
        <div class="header-container alignwide">
            <div class="header-logo">
                <a th:href="@{/}">Tgo's <span>Barbearia</span></a>
            </div>
            
            <!-- Botão do Menu Hambúrguer -->
            <div class="hamburger-menu" id="hamburgerMenu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>

            <nav class="header-nav" id="headerNav">
                <ul>
                    <li><a th:href="@{/}">Home</a></li>
                    <li><a th:href="@{/servicos}">Serviços</a></li>
                    <li><a th:href="@{/sobre-nos}">Sobre Nós</a></li>
                    <li><a th:href="@{/contato}">Contato</a></li>
                    <li><a th:href="@{/loja}">Loja</a></li>
                    <li><a th:href="@{/carrinho}">Carrinho</a></li>
                    <!-- O botão CTA inserido na lista apenas para a visualização mobile -->
                    <li class="mobile-cta"><a th:href="@{/servicos}" class="wp-element-button">Agendar Agora</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <a th:href="@{/servicos}" class="wp-element-button">Agendar</a>
            </div>
        </div>
        <script>
            document.addEventListener("DOMContentLoaded", function() {
                const hamburger = document.getElementById("hamburgerMenu");
                const nav = document.getElementById("headerNav");
                if(hamburger && nav) {
                    hamburger.addEventListener("click", function() {
                        hamburger.classList.toggle("active");
                        nav.classList.toggle("active");
                    });
                }
            });
        </script>
    </header>
</body>
</html>
