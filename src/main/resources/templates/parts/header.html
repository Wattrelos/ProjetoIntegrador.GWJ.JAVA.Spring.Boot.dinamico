<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!-- Fragmento do HEAD (usado para importar CSS) -->
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${empresa.nome}">Tgo's Barbearia</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <!-- Fragmento do HEADER (Cabeçalho da Página) -->
    <header class="modern-header" th:fragment="header">
        <div class="header-container alignwide">
            <div class="header-logo">
                <a th:href="@{/}" style="display: flex; align-items: center; gap: 10px;">
                    <img th:if="${empresa.logo_url != null and !empresa.logo_url.isEmpty()}" th:src="${empresa.logo_url}" th:alt="${empresa.logo_alt != null ? empresa.logo_alt : empresa.nome}" style="max-height: 40px;">
                    <span th:text="${empresa.nome}">Tgo's Barbearia</span>
                </a>
            </div>
            
            <!-- Botão do Menu Hambúrguer -->
            <div class="hamburger-menu" id="hamburgerMenu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>

            <nav class="header-nav" id="headerNav">
                <ul>
                    <li><a th:href="@{/}">Home</a></li>
                    <li><a th:href="@{/servicos}">Serviços</a></li>
                    <li><a th:href="@{/sobre-nos}">Sobre Nós</a></li>
                    <li><a th:href="@{/contato}">Contato</a></li>
                    <li><a th:href="@{/loja}">Loja</a></li>
                    <li><a th:href="@{/carrinho}">Carrinho</a></li>
                    <li th:if="${session.usuarioLogado != null}"><a th:href="@{/meus-agendamentos}">Meus Agendamentos</a></li>
                    <li th:if="${session.usuarioLogado != null}"><a th:href="@{/logout}" class="header-link-danger">Sair</a></li>
                    <li th:if="${session.usuarioLogado == null}"><a th:href="@{/login}">Entrar</a></li>
                    <li th:if="${session.usuarioLogado == null}"><a th:href="@{/cadastro}">Cadastrar</a></li>
                    <!-- O botão CTA inserido na lista apenas para a visualização mobile -->
                    <li class="mobile-cta"><a th:href="@{/servicos}" class="btn btn-theme">Agendar Agora</a></li>
                </ul>
            </nav>
            <div class="header-actions header-actions-group">
                <div th:if="${session.usuarioLogado != null}" class="header-user-menu">
                    <span class="header-welcome-text">Olá, <strong th:text="${session.usuarioLogado.nomeUsuario}">Cliente</strong></span>
                    <a th:href="@{/meus-agendamentos}" class="header-link">Meus Agendamentos</a>
                    <a th:href="@{/logout}" class="header-link-danger">Sair</a>
                </div>
                <div th:if="${session.usuarioLogado == null}" class="header-guest-menu">
                    <a th:href="@{/login}" class="header-link">Entrar</a>
                    <a th:href="@{/cadastro}" class="header-link-primary">Cadastrar</a>
                </div>
                <a th:href="@{/servicos}" class="btn btn-theme">Agendar</a>
            </div>
        </div>
        <script>
            document.addEventListener("DOMContentLoaded", function() {
                const hamburger = document.getElementById("hamburgerMenu");
                const nav = document.getElementById("headerNav");
                if(hamburger && nav) {
                    hamburger.addEventListener("click", function() {
                        hamburger.classList.toggle("active");
                        nav.classList.toggle("active");
                    });
                }
            });
        </script>
    </header>
</body>
</html>
