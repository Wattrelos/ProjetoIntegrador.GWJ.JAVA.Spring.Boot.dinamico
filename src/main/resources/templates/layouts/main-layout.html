<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org" 
    xmlns:layout="http://ultraq.net.nz">
<head>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
    <!-- 1. CSS de uso geral (carrega primeiro) -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    
    <!-- Chama o CSS do header aqui no HEAD -->
    <th:block th:replace="~{fragments/header :: header-css}"></th:block>

</head>
<body>
    <!-- Chama o HTML do header aqui no BODY -->
    <div th:replace="~{fragments/header :: header}"></div>
        
    <div class="content-wrapper"> 

        <main class="main-content" layout:fragment="content">
            <!-- Conteúdo principal sempre aparece -->
        </main>
    </div>

    <!-- Bootstrap Bundle with Popper (JS) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmxc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
