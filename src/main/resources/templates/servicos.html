<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{parts/header :: head}"></head>

<body>

    <!-- Substitui o antigo PHP include para inserir o header completo -->
    <div th:replace="~{parts/header :: header}"></div>

    <main class="wp-block-group alignfull page-main-bg">
        <div class="alignwide">
            <h1 class="text-center mb-20">Agende seu Horário</h1>
            <p class="page-header-subtitle">Escolha o serviço, o profissional e o melhor horário para você.</p>

            <div class="layout-grid">

                <!-- Coluna Esquerda: Escolha de Serviço e Data -->
                <div class="card-panel flex-col gap-2">

                    <div class="custom-form-group">
                        <label class="custom-label">1. Qual serviço deseja?</label>
                        <select class="custom-input" name="servicoId">
                            <!-- Serviços do Banco -->
                            <option th:each="s : ${servicos}" th:if="${s.ativo}" th:value="${s.id}"
                                th:text="${s.nome} + ' - R$ ' + ${#numbers.formatDecimal(s.preco, 1, 'POINT', 2, 'COMMA')}">
                            </option>
                        </select>
                    </div>

                    <div class="custom-form-group">
                        <label class="custom-label">2. Profissional de preferência</label>
                        <select class="custom-input" name="profissionalId">
                            <option value="">Qualquer profissional livre</option>
                            <!-- Profissionais do Banco -->
                            <option th:each="p : ${profissionais}" th:value="${p.id}"
                                th:text="${p.nome} + ' ' + ${p.sobrenome} + (${p.observacao != null && !p.observacao.isBlank()} ? ' (' + ${p.observacao} + ')' : '')">
                            </option>
                        </select>
                    </div>

                    <div class="custom-form-group">
                        <label class="custom-label">3. Escolha a Data</label>
                        <!-- Um campo de data que o navegador renderizará como um mini-calendário -->
                        <input type="date" value="2024-10-24" class="custom-input">
                    </div>

                </div>

                <!-- Coluna Direita: Grade de Horários -->
                <div class="card-panel">
                    <h3 class="panel-title">4. Horários Disponíveis</h3>
                    <p class="panel-subtitle">Quinta-feira, 24 de Outubro</p>

                    <div class="time-slots-grid">
                        <button type="button" class="wp-element-button time-slot-btn">09:00</button>
                        <button type="button" class="wp-element-button time-slot-btn" disabled>09:30</button>
                        <button type="button" class="wp-element-button time-slot-btn">10:00</button>
                        <!-- Simulação de horário selecionado (usando a cor theme-3 dourada diretamente) -->
                        <button type="button" class="wp-element-button time-slot-btn is-selected">10:30</button>
                        <button type="button" class="wp-element-button time-slot-btn" disabled>11:00</button>
                        <button type="button" class="wp-element-button time-slot-btn">11:30</button>
                        <button type="button" class="wp-element-button time-slot-btn">13:00</button>
                        <button type="button" class="wp-element-button time-slot-btn">13:30</button>
                    </div>

                    <a th:href="@{/checkout}" class="wp-element-button btn-block">Confirmar e Pagar</a>
                </div>
            </div>
        </div>
    </main>

    <!-- Substitui o antigo PHP include para inserir o footer completo -->
    <div th:replace="~{parts/footer :: footer}"></div>
</body>

</html>
